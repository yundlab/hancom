<!DOCTYPE html>
<!--
============================================================
  📒 기획서 — 여행 소비 기록장 "트래블틱 / Travel-Tick"
  (전체 기획서: 기획서.md / 기획서.pdf 참고)
============================================================

  ● 한 줄 소개
    여행 중 지출을 적으면 오늘 환율로 원화까지 자동 계산해 주고,
    카테고리·메모와 함께 여행별로 모아 보고, 일행과 쓴 돈을
    최소 송금 루트로 정산까지 해 주는 소비 기록장.

  ● 핵심 기능
    1. 여행 아카이브       : 여행 단위 관리 (진행중 / 예정 / 지난 구분)
    2. 지출 기록           : 카테고리·가게명·현지금액·날짜·[개인/공동]·결제자·메모
    3. 공동지출 참여자 선택 : 공동도 전원이 아닌 일부만 나눠 내게 참여자 선택
    4. 환율 자동 계산      : 현지통화 + 원화(KRW) 동시 표기, 입력 즉시 미리보기
    5. 예산 대시보드       : 예산 대비 막대그래프 + 사용률별 응원 문구
    6. 최적 정산          : 공동지출 → 최소 송금 루트(그리디) + 인원별 내역(±)
    7. 여행·지출 수정      : 만든 여행/지출 기록 모두 나중에 수정 가능

  ● 화면 구성 (멀티페이지 — 파일마다 다른 화면)
    ┌ index.html   🏠 홈 : 랜딩 히어로 + 통계 + 진행중/지난 여행 카드 + [새 여행]
    ├ create.html  ✍️ 여정 생성/수정 : 나라·이름·기간·예산·통화/환율·멤버 (?id=로 수정 겸용)
    ├ trip.html    🧾 타임라인 : 대시보드 + 지출 기록 폼 + 일차별 리스트 (카드 클릭=수정)
    └ report.html  💸 최종 결산 : 공동총액 + 최적 송금 루트 + 인원별 내역
    ※ 페이지끼리 데이터는 localStorage 로 공유 (store.js)

  ● 사용 기술 (배운 것)
    HTML 뼈대 · CSS 카드/막대그래프/반응형 · JS 이벤트 · querySelector
    createElement/appendChild · 배열/객체 · 조건문·함수 · localStorage · fetch(실시간 환율)
============================================================
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트래블틱 — 여행 소비 기록장</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="home-body">
  <main class="home-page">

    <!-- ===== 풀스크린 랜딩 히어로 (레트로 캐릭터) ===== -->
    <section class="landing">
      <nav class="landing-nav">
        <span class="logo"><i>The</i> TRAVELTICK</span>
        <div class="nav-menu">
          <a href="#trips">MY TRIPS</a>
          <a href="create.html">NEW TRIP</a>
          <a href="#trips" id="navReport">REPORT</a>
        </div>
        <a href="create.html" class="nav-add-mobile" aria-label="새 여행 만들기">＋</a>

        <svg class="hero-doodle doodle-ticket" data-depth="1.8" viewBox="0 0 60 60" aria-hidden="true">
          <g transform="rotate(-18 30 30)">

        </svg>

          <circle cx="52" cy="28" r="5" fill="var(--blue)"/>

        </svg>

        <svg class="hero-doodle doodle-heart" data-depth="1.5" viewBox="0 0 30 26" aria-hidden="true">

        </svg>
        <svg class="hero-doodle doodle-camera" data-depth="-1.7" viewBox="0 0 40 32" aria-hidden="true">

          <path d="M12 1 L14 10 L23 12 L14 14 L12 23 L10 14 L1 12 L10 10 Z" fill="var(--green)"/>
        </svg>

        <!-- 태그라인 (곡선 대신 일자로 심플하게) -->
        <p class="arch">LET'S TRAVEL &amp; MORE</p>

        <!-- 여행 마스코트 (선글라스 + 여행가방 든 캐릭터) -->
        <svg class="mascot" viewBox="0 0 300 340" aria-label="트래블틱 마스코트">

          <path d="M231 216 H253" stroke="var(--ink)" stroke-width="7" stroke-linecap="round"/>
          <circle cx="242" cy="214" r="17" fill="#fff" stroke="var(--ink)" stroke-width="5"/>
          <!-- 몸통/머리 -->
          <circle cx="150" cy="150" r="100" fill="#fff" stroke="var(--ink)" stroke-width="6"/>

          <path d="M92 68 Q92 20 150 20 Q208 20 208 68 Z" fill="var(--purple)" stroke="var(--ink)" stroke-width="5"/>
          <ellipse cx="150" cy="68" rx="76" ry="15" fill="var(--purple)" stroke="var(--ink)" stroke-width="5"/>
          <!-- 볼터치 -->

          <g fill="var(--ink)">
            <rect x="74" y="118" width="66" height="42" rx="11"/>
            <rect x="160" y="118" width="66" height="42" rx="11"/>
            <rect x="138" y="130" width="24" height="11"/>
            <rect x="56" y="124" width="20" height="11" rx="4"/>
            <rect x="224" y="124" width="20" height="11" rx="4"/>

          <rect x="86" y="127" width="13" height="9" fill="var(--paper)"/>
          <rect x="172" y="127" width="13" height="9" fill="var(--paper)"/>
          <!-- 활짝 웃는 입 -->
          <path d="M104 178 Q150 242 196 178 Z" fill="var(--ink)"/>
          <path d="M104 178 Q150 192 196 178 Z" fill="var(--paper)"/>
          <ellipse cx="150" cy="214" rx="20" ry="13" fill="var(--blue)"/>

      </div>

      <!-- 하단 초대형 워드마크 (아웃라인 + 하프톤) — 스크롤하면 왼쪽으로 슬라이드되며 사라짐 -->
      <h1 class="wordmark" data-text="TRAVELTICK">TRAVELTICK</h1>

      <a href="#trips" class="scroll-cue">SCROLL <span>⌄</span></a>
    </section>

    <!-- ===== 콘텐츠 : 여행 리스트 ===== -->
    <section class="content" id="trips">
      <div class="content-inner">

        <div class="stat-strip reveal">
          <div class="stat2"><b id="statTrips">0</b><span>여행</span></div>
          <div class="stat2"><b id="statSpent">0</b><span>총 지출(원)</span></div>
          <div class="stat2"><b id="statOngoing">0</b><span>진행 중</span></div>
        </div>

        <div class="home-sec reveal">
          <h2 class="sec-title">🟢 진행 중 · 다가오는 여행</h2>
          <div id="ongoingList" class="trip-cards"></div>
        </div>

        <div class="home-sec reveal">
          <h2 class="sec-title">🗂️ 지난 여행</h2>
          <div id="pastList" class="trip-cards grid"></div>
        </div>
      </div>
    </section>

    <!-- 새 여행 만들기 -->
    <a class="fab" href="create.html">＋ 새 여행 만들기</a>
  </main>

  <script src="scripts/store.js"></script>
  <script src="scripts/home.js"></script>
</body>
</html>
