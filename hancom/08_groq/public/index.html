<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇 사이트</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            box-sizing: border-box;
        }
        body {
            background: #faf7f7;
        }
        h1 {
            text-align: center;
            margin: 40px 0 20px 0;
            color: #ff4747;
            font-size: 32px;
            font-weight: 800;
        }
        /* 대화 지우기 버튼 (헤더) */
        .chatHead {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;   /* 버튼과 대화창 사이 여백 */
        }
        #clear {
            position: static;   /* 일반 button의 absolute 무시 → 대화창 위 정상 위치 */
            border: 2px solid #ddd;
            background: #fff;
            color: #888;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        #clear:hover {
            border-color: #ff4747;
            color: #ff4747;
        }
        .wrap {
            width: 90%;
            max-width: 640px;
            margin: 0 auto;
        }
        /* 대화가 쌓이는 영역 */
        .chat {
            height: 60vh;
            overflow-y: auto;
            border: 3px solid #eee;
            border-radius: 14px;
            background: #fff;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 말풍선 공통 */
        .msg {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 16px;
            line-height: 1.6;      /* 여러 줄일 때 줄 간격 → 이제 눈에 보임 */
            white-space: pre-wrap; /* 줄바꿈/공백 살리기 */
            word-break: break-word;
        }
        /* 내가 보낸 질문 (오른쪽, 빨강) */
        .me {
            align-self: flex-end;
            background: #ff4747;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        /* AI 응답 (왼쪽, 회색) */
        .ai {
            align-self: flex-start;
            background: #f1f1f1;
            color: #222;
            border-bottom-left-radius: 4px;
        }
        .qBox {
            position: relative;
            margin: 16px 0 40px 0;
        }
        input {
            width: 100%;
            height: 46px;
            padding: 0 90px 0 16px;
            border-radius: 12px;
            border: 3px solid #ff4747;
            font-size: 16px;
            outline: none;
        }
        button {
            position: absolute;
            right: 6px;
            top: 6px;
            height: 34px;
            padding: 0 16px;
            border: none;
            background: #ff4747;
            color: #fff;
            border-radius: 9px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>무엇이든 물어보세요 :D</h1>
        <div class="chatHead">
            <button id="clear" title="대화 지우기">🗑</button>
        </div>
        <div class="chat" id="chat"></div>
        <div class="qBox">
            <input id="q" placeholder="오늘은 어떤 도움을 드릴까요" />
            <button id="btn">보내기</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
