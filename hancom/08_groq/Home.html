<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>챗봇 사이트</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            padding: 0; margin:0;
        }
        h1 {
            text-align: center;
            margin:100px 0 30px 0;
            color:#ff4747;
            font-size: 40px;
            font-weight: 800;
        }
        .qBox {
            margin: 0 auto;
            width:80%;
            position: relative;
        }
        input {
            width:100%;
            height:40px;
            border-radius: 10px;
            border: 3px solid #ff4747;
        }
        button {
            padding:0 10px;
            position: absolute;
            right: 14px;
            bottom: 5px;
            height: 36px;
            border: none;
            background:#ff4747;
            color: #fff;
            border-radius: 10px;
            font-weight: 600
        }
        .ansBox{
            border: 3px solid #ccc;
            border-radius: 10px;
            margin:50px auto;
            padding:10px;
            width:78%;
            
        }
    </style>
</head>
<body>
    <h1>무엇이든 물어보세요:D</h1>
    <div class="ansBox">
        <p>AI 응답: <b id="ans"></b></p>
    </div>
    <div class="qBox">
        <input id="q" placeholder="오늘은 어떤 도움을 드릴까요" />
        <button id="btn">보내기</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
