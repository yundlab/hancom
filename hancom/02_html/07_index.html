<!DOCTYPE html>     <!-- HTMl 문서 알려주기 -->
<html lang="ko">    <!-- 문서 시작, 한국어 페이지 -->
    <head>          <!-- 화면에 안 보이는 칸 -->
        <meta charset="UTF-8">      <!-- 한글 안 깨지게 -->
        <title>강조와 중첩</title>    <!-- 브라우저 탭에 뜨는 이름-->
    </head>
    <body>      <!-- 화면에 보이는 내용 칸 -->
        <!-- 중첩 : 태그 안에 태그 넣기 strong은 글자를 굵게 강조 -->
        <p>
            저는 <strong>개발</strong>하는 것을 좋아합니다. &lt;아니&amp;&gt;
        </p>
        <p>
            5 &lt; 10
            <
            >
            <!-- 엔티티 출력은 잘 되나 권장하지 않음 -->
        </p>
    </body>
</html>
