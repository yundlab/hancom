<!DOCTYPE html>     <!-- 이건 HTML 문서라고 알려주기 -->
<html lang="ko">    <!-- 문서의 시작, 한국어 페이지 -->
    <head>          <!-- 화면에 안 보이는 칸 -->
        <meta charset="UTF-8">         <!-- 한글 안 깨지게 -->
        <title> 태그 + 뼈대 </title>    <!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <!-- 화면에 보이는 진짜 내용 칸 -->
    <body>
        <h1>
            태그와 뼈대를 공부하자.
        </h1>
    </body>
</html>

<!-- - 요소(element) = 여는 태그 + 내용 + 닫는 태그 
- 태그 이름은 대소문자 안가림 (H1= h1) -->
