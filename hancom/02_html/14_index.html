<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- HTML 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 문서에 보이지 않는 칸 -->
    <head>
        <!-- 빈 요소, 한국어 깨지지 않도록 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름-->
        <title>
            표 만들기
        </title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <table style="border:1px solid #333;">
            <caption> AI기반 프론트엔드 웹개발자 양성과정 </caption>
            <!-- tr : 가로 한줄, th : 제목 칸 -->
            <tr style="background-color: bisque;"><th>날짜</th><th>요일</th><th>내용</th><th>시간</th></tr>
            <!-- td : 보통 내용 칸 -->
            <tr><td>2026.06.29</td><td>월</td><td>HTML | 01-11</td><td>7H</td></tr>
            <tr><td>2026.06.30</td><td>화</td><td>HTML</td><td>7H</td></tr>
            <tr><td>2026.07.01</td><td>수</td><td>CSS</td><td>7H</td></tr>
            <tr><td>2026.07.02</td><td>목</td><td>CSS</td><td>7H</td></tr>
            <tr><td>2026.06.03</td><td>금</td><td>JS</td><td>7H</td></tr>
        </table>
    </body>
</html>
