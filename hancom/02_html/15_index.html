<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- HTML 시작, 한국어 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <!-- 한글 깨지지 않도록 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>
            폼 그리고입력
        </title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <!-- 입력 칸들을 담는 묶는 상자 -->
        <form>
            <!-- label : 설명 글자, input : 글자 칸 -->
            <label>이름 : <input type="text" placeholder="이름을 적어주세요"></label>
            <br>
            <hr>
            <label>목표 : <input type="number" placeholder="HTML 능력 목표치 1 ~ 10"></label>
            <br>
            <hr>
            <label>좋아하는 색상 : <input type="color" placeholder="좋아하는 색상은"></label>
            <br>
            <hr>
            <label>생일 : <input type="datetime-local"></label>
            <br>
            <hr>
            <button type="submit">보내기</button>
        </form>
    </body>
</html>
