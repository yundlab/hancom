<!DOCTYPE html>     <!-- 이건 HTML 문서-->
<html lang="ko">    <!-- 문서 시작, 한국어 페이지-->
    <head>
        <!-- 한국어 깨지지 않게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>
            번호 목록
        </title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <!-- 번호가 자동으로 붙는 목록(순서 중요할 때) -->
         <ol type="1">
            <li>먹는 것</li>
            <ol type="a">
                <li>고기</li>
                <ol type="i">
                    <li>삼겹살</li>
                    <li>돼지갈비</li>
                    <li>항정살</li>
                </ol>
                <li>냉면</li>
                <ol type="i">
                    <li>물냉면</li>
                    <li>비빔냉면</li>
                </ol>
                <li>분식</li>
            </ol>
            <li>자는 것</li>
            <ol type="a">
                <li>침대</li>
                <li>수면안대</li>
                <li>가습기</li>
            </ol>
            <li>걷는 것</li>
         </ol>
    </body>
</html>
