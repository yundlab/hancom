<!DOCTYPE html>         <!-- 이건 HTML 문서 -->
<html lang="ko">        <!-- 문서 시작, 한국어 페이지 -->
    <head>              <!-- 화면에 안 보이는 준비 칸 -->
        <meta charset="UTF-8">  <!-- 한글 안 깨지도록 -->
        <!--브라우저 탭에 뜨는 이름 -->
        <title>
            이미지 넣기
        </title>
    </head>
    <body>  <!-- 화면에 보이는 내용 칸 -->
        <!-- 화면에 사진 붙이기, 닫는 태그 없는 빈 요소라 /> 로 끝 맺음 -->
        <!-- src = 사진 주소 / alt = 사진 안 뜰 때 대신 보일 글자 -->
        <img src="image.jpg" alt="예시 사진"/>
    </body>
</html>

1. 원하는 이미지 찾기
1-1. https://www.pexels.com
2. 원하는 이미지 상대 경로로 복사
3. <img/> 태그 안에 src에 경로 넣어주기
-->
