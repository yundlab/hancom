<!DOCTYPE html>     <!-- 이건 HTML 문서-->
<html lang="ko">    <!-- 문서 시작, 한국어 페이지-->
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">      <!-- 한글 안 깨지도록 -->
        <!-- 브라우저 탭 이름 -->
        <title>자기소개</title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <header>
            <h1>
                YUN 소개 페이지
            </h1>
        </header>
        <!-- 핵심 내용 (페이지에 하나) -->
        <main>
            <img src="https://picsum.photos/300/200" alt="내 사진">
            <p>안녕하세요. 저는 웹 개발을 배우는 한윤지입니다.</p>
            <ul>
                <li><strong>취미:</strong>영화관람</li>
                <li><strong>목표:</strong>풀스택 개발자</li>
                <li><strong>이메일:</strong>by.yundlab@gmail.com</li>
            </ul>
        </main>
        <!-- 맨 아래 꼬리말 -->
        <footer>
            <a href="https://github.com/yundlab">GitHub</a><br>
            <a href="https://yundlab.tistory.com/">Blog</a>
        </footer>
    </body>
</html>

<!-- 
요소 : 여는 태그 + 내용 + 닫는 태그
빈 요소 : <img/>, <meta/>
시맨틱 : <header></header>, <main></main>, <footer></footer>
속성 : 태그 안에 들어가는 값 / 예: <a href="https://www.google.com
-->
