<!-- HTML 문서 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <!-- 한글 안 깨지게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 제목 -->
        <title>
            목록 및 시맨틱
        </title>
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <!-- 페이지 맨 위 구역 -->
        <header>
            맨 위 (로고 혹은 제목)
        </header>
        <!-- 페이지 핵심 내용 구역 -->
        <main>
            <ul>
                <li>
                    좋아하는 것 : 영화
                </li>
                <li>
                    취미 : 산책
                </li>
                <li>
                    목표 : 웹 개발자
                </li>
                <li>
                    여행지 : 미국
                </li>
                <li>
                    좋아하는 음식 : 한식
                </li>
            </ul>
        </main>
        <!-- 페이지 맨 아래 구역 -->
        <footer>
            맨 아래 (저작권 및 연락처)
        </footer>
        
    </body>
</html>
