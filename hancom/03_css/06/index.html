<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 붙이는 3가지 방법(외부 | 내부 | 인라인)</title>
    <!-- 1. 외부 -->
    <link rel="stylesheet" href="./styles/main.css" />
    <!-- 2. 내부 -->
    <style>
        p {
            color: green;
        }
    </style>
</head>
<body>
    <h1>외부 스타일로  핑크</h1>
    <p>내부 스타일로 초록색 지정</p>
    <!-- 3. 인라인 -->
    <p style="color:red;">인라인으로 빨강</p>
</body>
</html>
