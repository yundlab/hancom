<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/main.css">
    <title>카드 뒤집기 3D</title>
</head>
<body>
    <h1>카드 뒤집기 3D</h1>
    <!-- card: 바깥 틀 -->
    <div class="card">
        <!-- inner: 실제로 회전하는 부분 -->
        <div class="inner">
            <!-- 평소 보이는 면 -->
            <div class="front">앞면!</div>
            <!-- 뒤집으면 보이는 면 -->
            <div class="back">뒷면!</div>
        </div>
    </div>
</body>
</html>
