<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뚝딱 계산기</title>

  <!-- Pretendard (본문) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css" />
  <!-- Do Hyeon = BM 도현체 (디스플레이) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <header class="wordmark">
      <span class="wordmark__mark" aria-hidden="true">✎</span>
      <h1 class="wordmark__text">뚝딱 계산기</h1>
      <span class="wordmark__coin" aria-hidden="true">＝</span>
    </header>

    <section class="calc" aria-label="계산기">
      <!-- 결과 화면 -->
      <div class="screen">
        <p class="screen__tape" id="tape" aria-hidden="true">숫자를 눌러 보세요</p>
        <output class="screen__result" id="result" aria-live="polite">0</output>
      </div>

      <!-- 키패드 -->
      <div class="keypad" role="group" aria-label="키패드">
        <button class="key key--ac"  data-action="clear"       type="button">AC</button>
        <button class="key key--fn"  data-action="delete"      type="button" aria-label="지우기">⌫</button>
        <button class="key key--fn"  data-action="percent"     type="button" aria-label="퍼센트">%</button>
        <button class="key key--op"  data-action="op" data-op="÷" type="button" aria-label="나누기">÷</button>

        <button class="key" data-action="digit" data-digit="7" type="button">7</button>
        <button class="key" data-action="digit" data-digit="8" type="button">8</button>
        <button class="key" data-action="digit" data-digit="9" type="button">9</button>
        <button class="key key--op" data-action="op" data-op="×" type="button" aria-label="곱하기">×</button>

        <button class="key" data-action="digit" data-digit="4" type="button">4</button>
        <button class="key" data-action="digit" data-digit="5" type="button">5</button>
        <button class="key" data-action="digit" data-digit="6" type="button">6</button>
        <button class="key key--op" data-action="op" data-op="−" type="button" aria-label="빼기">−</button>

        <button class="key" data-action="digit" data-digit="1" type="button">1</button>
        <button class="key" data-action="digit" data-digit="2" type="button">2</button>
        <button class="key" data-action="digit" data-digit="3" type="button">3</button>
        <button class="key key--op" data-action="op" data-op="+" type="button" aria-label="더하기">+</button>

        <button class="key key--fn" data-action="negate" type="button" aria-label="부호 전환">±</button>
        <button class="key" data-action="digit" data-digit="0" type="button">0</button>
        <button class="key" data-action="dot" type="button" aria-label="소수점">.</button>
        <button class="key key--eq" data-action="equals" type="button" aria-label="계산">=</button>
      </div>
    </section>

    <p class="footnote">배민 간판 미감으로 뚝딱, 손맛 나는 계산기</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
