<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네온 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="calc" role="application" aria-label="계산기">
    <!-- 상단 바 -->
    <div class="topbar">
      <span class="brand">NEON&nbsp;CALC</span>
      <div class="top-actions">
        <button id="historyToggle" class="icon-btn" aria-label="계산 기록 열기" title="계산 기록">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 3"/></svg>
        </button>
        <button id="themeToggle" class="icon-btn" aria-label="라이트/다크 전환" title="테마 전환">
          <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>

    <!-- 디스플레이 -->
    <div class="display">
      <div id="expression" class="expression" aria-hidden="true"></div>
      <div class="result-row">
        <div id="result" class="result" role="status" aria-live="polite">0</div>
        <button id="copyBtn" class="copy-btn" aria-label="결과 복사" title="결과 복사">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>

    <!-- 키패드 -->
    <div class="keys">
      <button class="key fn" data-action="clear">AC</button>
      <button class="key fn" data-action="negate">±</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key op" data-op="/">÷</button>

      <button class="key num" data-num="7">7</button>
      <button class="key num" data-num="8">8</button>
      <button class="key num" data-num="9">9</button>
      <button class="key op" data-op="*">×</button>

      <button class="key num" data-num="4">4</button>
      <button class="key num" data-num="5">5</button>
      <button class="key num" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key num" data-num="1">1</button>
      <button class="key num" data-num="2">2</button>
      <button class="key num" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key fn" data-action="backspace" aria-label="지우기">⌫</button>
      <button class="key num" data-num="0">0</button>
      <button class="key num" data-action="dot">.</button>
      <button class="key eq" data-action="equals">=</button>
    </div>
  </div>

  <!-- 히스토리 패널 -->
  <aside id="historyPanel" class="history" aria-hidden="true">
    <div class="history-head">
      <span>계산 기록</span>
      <div>
        <button id="clearHistory" class="text-btn" title="기록 전체 삭제">전체 삭제</button>
        <button id="closeHistory" class="icon-btn" aria-label="기록 닫기" title="닫기">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <ul id="historyList" class="history-list"></ul>
    <p id="historyEmpty" class="history-empty">아직 계산 기록이 없어요.</p>
  </aside>
  <div id="overlay" class="overlay" hidden></div>

  <div id="toast" class="toast" role="alert" hidden></div>

  <script src="script.js"></script>
</body>
</html>
