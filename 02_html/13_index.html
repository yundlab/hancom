<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <!-- 한글 깨지지 않게 -->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름 -->
        <title>
            줄 및 선
        </title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <hr>
        <!--- br = 한 문단 안에서 줄 바꾸기 (닫는 태그가 없는 빈 요소) -->
        <p>첫째 줄<br> 둘째 줄</p>
        <hr>
        <p>첫째 줄<br> 둘째 줄</p>
        <!-- hr = 내용을 나누는 가로 줄 (닫는 태그가 없는 빈 요소) -->
        <hr>
    </body>
</html>
