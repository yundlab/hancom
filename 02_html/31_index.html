<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Emmet 자동완성</title>
    </head>
    <body>
        <!-- ul>li*N -->
        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>

        <!-- .box -->
        <div class="box"></div>
        <div class="text"></div>
        <div class="card"></div>

        <!-- #top -->
        <div id="top"></div>
        <div id="bottom"></div>
        <div id="middle"></div>

        <!-- h1{넣을 내용} -->
        <h1>잘가</h1>
        <h1>중괄호 넣고 내용</h1>

        <!-- 원하는 태그{넣을 내용} -->
        <div>이것도되나요</div>
        <div>section</div>

        <!-- a[href=#] -->
        <a href="#"></a>
        <audio src="#"></audio>

    </body>
</html>

<!--

1. > : 안에 넣기(자식) ul>li : ul안에 li
2. *N : N번 반복 li*3 = li 3개
3. .이름 : class 붙이기
4. #이름 : id 붙이기
5. {글자} : 태그 안의 내용
6. [속성] : 속성 넣기

-->
