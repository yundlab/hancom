<!-- HTML 문서 선언 -->
<!DOCTYPE html>
<!-- 문서의 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">
        <!-- 브라우저 탭에 뜨는 이름 -->
        <title>
            제목과 문단
        </title>
    </head>
    <!-- 화면에 보이는 칸 -->
    <body>
        <!-- 제목은 크기 6단계(h1이 제일 크고 숫자 커질 수록 작아짐) -->
        <h1>h1 : 제일 큰 글자 h1</h1>
        <h2>h2 : 제일 큰 글자 h2</h2>
        <h3>h3 : 제일 큰 글자 h3</h3>
        <h4>h4 : 제일 큰 글자 h4</h4>
        <h5>h5 : 제일 큰 글자 h5</h5>
        <h6>h6 : 제일 큰 글자 h6</h6>
        
        <!-- 문단(글 한 덩어리) -->
        <p>저는 HTML을 배우는 사람입니다.</p>

    </body>
</html>
