<!DOCTYPE html>

    <title>선택자</title>

<body>
    <h1>css 첫 걸음</h1>
    <p>모든 p는 초록</p>
    <p class="special">이 줄만 주황</p>
    <p class="normal">이 줄만 블랙</p>
    <ul>
        <li>사과</li>
        <li><em>바나나</em>는 보라색</li>
    </ul>
    <p class="normal">이 줄도 블랙</p>
    <p class="check">나뭇잎</p>
</body>
